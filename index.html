<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>历史小卡片</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#7dd3fc;--text:#e6eef6}
    html,body{height:100%;margin:0;font-family:Inter, "PingFang SC", "Microsoft YaHei", sans-serif}
    body{background:linear-gradient(180deg,#071226 0%, #071a2a 100%);color:var(--text);padding:5px}
    .container{max-width:1000px;margin:0 auto;width:100%}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{margin:0;font-size:20px;letter-spacing:1px}
    .card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.5);margin-top:16px;border:1px solid rgba(255,255,255,0.05)}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type=text], select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:inherit;outline:none}
    input[type=text]:focus{border-color:var(--accent)}
    .controls{display:flex;gap:12px;align-items:center;margin:20px 0;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.05)}
    button{background:linear-gradient(90deg,var(--accent),#60a5fa);border:0;padding:10px 20px;border-radius:8px;color:#042029;font-weight:600;cursor:pointer;transition:opacity 0.2s}
    button:disabled{opacity:0.6;cursor:not-allowed}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted)}
    .meta{font-size:13px;color:var(--muted);font-family:ui-monospace, monospace}
    .pane{min-height:500px;overflow:auto;background:rgba(255,255,255,0.01);padding:5px;border-radius:10px;line-height:1.7}
    /* Markdown 样式微调 */
    #rendered h2{border-left:4px solid var(--accent);padding-left:12px;font-size:1.4em;margin-top:1.5em}
    #rendered blockquote{border-left:4px solid #334155;margin:1em 0;padding-left:1em;color:var(--muted)}
    #rendered pre{background:rgba(0,0,0,0.3);padding:12px;border-radius:6px;overflow-x:auto}
    #rendered code{color:var(--accent);font-family:monospace}
    .tiny{font-size:12px;color:var(--muted);margin-top:4px}
    .badge{background:rgba(125,211,252,0.1);color:var(--accent);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:bold}
    #genTime{color:var(--accent);font-weight:bold}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>历史小卡片</h1>
        <div class="tiny">Engine: <strong>qwen3.5-plus</strong> · 实时深度博弈拆解</div>
      </div>
      <div class="badge">PRO 模式</div>
    </header>

    <div class="card">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <label>DashScope API Key</label>
          <input id="apiKey" type="text" placeholder="输入 Key 并回车以保存" />
        </div>
        <div style="width:160px">
          <label>模型选择</label>
          <select id="modelSelect">
            <option value="qwen-plus">qwen3.5-plus</option>
            <option value="qwen-max">qwen-max</option>
          </select>
        </div>
      </div>

      <div class="controls">
        <button id="generateBtn">随机生成下一篇</button>
        <button id="copyBtn" class="ghost">复制结果</button>
        <div class="meta">
          耗时：<span id="genTime">0.00s</span> | 状态：<span id="status">待命</span>
        </div>
      </div>

      <div class="pane">
        <div id="rendered">
          <p style="color:var(--muted);text-align:center;margin-top:100px;">
            请确保 API Key 已设置，点击按钮开始历史复盘。
          </p>
        </div>
      </div>

    </div>
  </div>

<script>

const CACHE_KEY="gai_history_cache"
const DEFAULT_MODEL="qwen3.5-plus"

function qs(s){return document.querySelector(s)}

const apiKeyInput=qs("#apiKey")
const rendered=qs("#rendered")
const generateBtn=qs("#generateBtn")
const statusEl=qs("#status")
const genTimeEl=qs("#genTime")
const modelSelect=qs("#modelSelect")
const copyBtn=qs("#copyBtn")

function saveKey(k){localStorage.setItem("gai_apikey",k)}
function loadKey(){return localStorage.getItem("gai_apikey")||""}

apiKeyInput.value=loadKey()

apiKeyInput.addEventListener("change",()=>{
saveKey(apiKeyInput.value.trim())
})

copyBtn.onclick=()=>{
navigator.clipboard.writeText(rendered.innerText)
alert("已复制")
}

function randomVolume(){
return `卷${Math.floor(Math.random()*260)+30}`
}

function buildPrompt(volume){

return `# Role
你是一位精通中国历史文献的资深史学家，尤其擅长《资治通鉴》的文本解读与人物心理分析。你具备深厚的古文功底，能够精准翻译晦涩的文言实词与虚词，同时拥有现代管理学与博弈论的视角，能从多维度复盘历史事件。

# Task
请**仅从《资治通鉴》卷${volume} 中**选取一个完整的历史故事。。
**核心约束**：该故事必须**避开**大众熟知的著名典故（如：赤壁之战、淝水之战、玄武门之变、商鞅变法、完璧归赵等）。请选择一个相对冷门、细节丰富且具有人性张力的片段（例如：某次具体的宫廷政变细节、某位名臣的仕途转折、一次鲜为人知的外交博弈等）。

# Workflow
1. **选材确认**：简要介绍所选故事的背景（时间、地点、核心冲突），并说明为何选择这个故事（其独特性或启示意义）。
2. **原文呈现**：摘录《资治通鉴》中关于该故事的完整原文段落。
3. **白话译文**：提供流畅、准确且符合现代阅读习惯的白话文翻译，保留原文的语气色彩。
4. **多视角深度复盘**：这是核心部分。请分别站在故事中**至少三个关键角色**的立场上，进行第一人称或深度第三人称的复盘。
   - **复盘维度**需包含：
     - **当时情境**：角色在当时掌握的信息、面临的压力与局限。
     - **决策逻辑**：角色做出该行为背后的深层动机（利益、情感、价值观或生存本能）。
     - **得失反思**：如果站在上帝视角回看，该角色的策略有何优劣？是否有更好的破局之道？
5. **史家点评**：结合司马光的“臣光曰”（若有）或你自己的专业见解，总结该故事对现代人的启示。

# Output Format
请严格按照以下Markdown格式输出：

## 1. 故事档案
- **出处**：《资治通鉴》卷XX · [朝代]
- **故事标题**：[自拟一个精炼的标题]
- **选材理由**：[简述]

## 2. 原文选段
> [在此处插入古文原文]

## 3. 白话译注
[在此处插入白话文翻译，关键人名、地名可加注]

## 4. 多维角色复盘
### 👤 角色A：[姓名/身份]
- **处境分析**：...
- **内心独白/决策推演**：...
- **复盘反思**：...

### 👤 角色B：[姓名/身份]
- **处境分析**：...
- **内心独白/决策推演**：...
- **复盘反思**：...

### 👤 角色C：[姓名/身份]
- **处境分析**：...
- **内心独白/决策推演**：...
- **复盘反思**：...

## 5. 史家总评
[在此处撰写总结性评论]

# Constraints
- 严禁选择教科书级别的著名故事。
- 译文需信、达、雅，避免过度口语化导致历史厚重感缺失。
- 角色复盘需避免脸谱化，要挖掘人性的复杂灰度。
- 保持客观中立，不强行灌输现代价值观，但要提炼普世智慧。

请开始执行任务。`;
}

async function fetchWithRetry(fn,retries=2){
try{
return await fn()
}catch(e){
if(retries===0)throw e
await new Promise(r=>setTimeout(r,1500))
return fetchWithRetry(fn,retries-1)
}
}

async function streamArticle(onToken){

const key=loadKey()
const model=modelSelect.value||DEFAULT_MODEL
const volume=randomVolume()

const prompt=buildPrompt(volume)

const resp=await fetch(
"https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
{
    method:"POST",
    headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
    },
body:JSON.stringify({
model:model,
stream:true,
temperature:0.7,
messages:[{role:"user",content:prompt}]
    })
}
)

if(!resp.ok){

const text=await resp.text()

throw new Error(text.slice(0,200))

}

const reader=resp.body.getReader()
const decoder=new TextDecoder()

let full=""

while(true){

const {done,value}=await reader.read()

if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

for(const line of lines){

if(!line.startsWith("data:"))continue

const json=line.replace("data:","").trim()

if(json==="[DONE]")continue

try{

const data=JSON.parse(json)

const token=data.choices?.[0]?.delta?.content

if(token){

full+=token

onToken(token,full)

}

}catch{}

}

}

return full

}

let buffer=""
let renderTimer=null

function scheduleRender(){

if(renderTimer)return

renderTimer=setTimeout(()=>{

rendered.innerHTML=marked.parse(buffer)

renderTimer=null

},80)

}

async function generate(){

const key=loadKey()

if(!key){
alert("请先输入API Key")
return
}

buffer=""

rendered.innerHTML=""

statusEl.textContent="生成中"

generateBtn.disabled=true

let start=performance.now()

const timer=setInterval(()=>{

genTimeEl.textContent=((performance.now()-start)/1000).toFixed(2)+"s"

},50)

  try{

await fetchWithRetry(()=>streamArticle((token,full)=>{

buffer=full

scheduleRender()

}))

statusEl.textContent="完成"

}catch(e){

rendered.innerHTML="<p style='color:#f87171'>"+e.message+"</p>"

statusEl.textContent="异常"

}

clearInterval(timer)

generateBtn.disabled=false

}

generateBtn.onclick=generate

</script>

</body>
</html>
